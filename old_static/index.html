<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasaq01 - تجربة نسق</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-container">
        <!-- Top Utility Bar -->
        <div class="top-bar">
            <!-- Left aligned in LTR, Right aligned in RTL. Design has En on left side, ? on right. Let's force flex order or use LTR for this specific bar -->
            <div class="top-bar-inner">
                <div class="top-bar-left">
                    <span>En</span>
                </div>
                <div class="top-bar-right">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                        <line x1="12" y1="17" x2="12.01" y2="17"></line>
                    </svg>
                </div>
            </div>
        </div>

        <main class="main-content">
            <!-- Header section inside white area -->
            <header class="header">
                <!-- Logo left (RTL right technically, but looking at design, logo is on the left edge, hamburger on right edge) 
                     So we'll use dir="ltr" for header or just flex-direction.
                -->
                <div class="header-inner" dir="ltr">
                    <div class="logo">
                        <img src="logo-brand.png" alt="Nasaq Logo" class="brand-logo">
                    </div>
                    <button class="hamburger-menu">
                        <span></span>
                        <span></span>
                        <span></span>
                    </button>
                </div>
            </header>

            <section class="hero-section">
                <h1 class="hero-title">تجربة نسق</h1>

                <div class="action-buttons">
                    <button class="action-btn">
                        <svg class="btn-icon" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 8v13H3V8"></path>
                            <path d="M1 3h22v5H1z"></path>
                            <path d="M12 12v5"></path>
                            <path d="M9 14l3 3 3-3"></path>
                        </svg>
                        <span class="btn-text">حجز موعد استلام</span>
                    </button>

                    <button class="action-btn">
                        <svg class="btn-icon" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 8v13H3V8"></path>
                            <path d="M1 3h22v5H1z"></path>
                            <path d="M12 17v-5"></path>
                            <path d="M9 15l3-3 3 3"></path>
                        </svg>
                        <span class="btn-text">حجز موعد إرسال</span>
                    </button>
                </div>
            </section>
        </main>



        <footer class="footer">
            <div class="footer-content" dir="ltr">
                <!-- Left: Logo -->
                <div class="footer-left">
                    <div class="logo footer-logo">
                        <img src="logo-white.png" alt="Nasaq Logo" class="footer-brand-logo">
                    </div>
                </div>

                <!-- Right: Links & Social -->
                <div class="footer-right">
                    <ul class="footer-links" dir="rtl">
                        <li><a href="#">شروط الخدمة</a></li>
                        <li><a href="#">سياسة الخصوصية</a></li>
                        <li><a href="#">إشعار الخصوصية</a></li>
                        <li><a href="#">مركز المساعدة</a></li>
                    </ul>

                    <div class="social-icons">
                        <a href="#"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path
                                    d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z">
                                </path>
                                <rect x="2" y="9" width="4" height="12"></rect>
                                <circle cx="4" cy="4" r="2"></circle>
                            </svg></a>
                        <a href="#"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path>
                            </svg></a>
                        <a href="#"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path
                                    d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33 2.78 2.78 0 0 0 1.94 2c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.33 29 29 0 0 0-.46-5.33z">
                                </path>
                                <polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"></polygon>
                            </svg></a>
                    </div>
                </div>
            </div>

            <div class="copyright">
                © 2026 جميع الحقوق محفوظة لنسق | Nasaq
            </div>
        </footer>
    </div>
</body>

</html>
